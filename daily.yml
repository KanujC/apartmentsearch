name: Daily Apartment Search

on:
  schedule:
    # Runs every day at 07:00 Berlin time (06:00 UTC in winter, 05:00 in summer)
    - cron: "0 6 * * *"
  workflow_dispatch:   # also allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit seen_ids.json back

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a PAT so the commit-back step can push
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run apartment agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          # ── Search criteria (edit these or add them as repo variables) ──
          CITY:       ${{ vars.CITY      || 'Berlin' }}
          MIN_ROOMS:  ${{ vars.MIN_ROOMS || '2' }}
          MAX_ROOMS:  ${{ vars.MAX_ROOMS || '4' }}
          MIN_SIZE:   ${{ vars.MIN_SIZE  || '40' }}
          MAX_SIZE:   ${{ vars.MAX_SIZE  || '120' }}
          MIN_PRICE:  ${{ vars.MIN_PRICE || '0' }}
          MAX_PRICE:  ${{ vars.MAX_PRICE || '1500' }}
        run: python main.py

      - name: Commit updated seen_ids.json
        run: |
          git config user.name  "apartment-agent[bot]"
          git config user.email "apartment-agent@users.noreply.github.com"
          git add seen_ids.json
          git diff --cached --quiet || git commit -m "chore: update seen listings [skip ci]"
          git push
